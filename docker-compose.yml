services:
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: fuseki-server
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=admin123
      - JVM_ARGS=-Xmx2g
      - TDB=2
      - FUSEKI_DATASET_1=smartphone_log
    volumes:
      - fuseki-data:/fuseki
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/$/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: .
    ports:
      - "8000:8000"
      - "18000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5:4b-q8_0}
      - OLLAMA_NUM_PREDICT=${OLLAMA_NUM_PREDICT:-1024}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-8192}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.3}
      - LLM_REQUEST_DELAY_SEC=${LLM_REQUEST_DELAY_SEC:-0}
      - SPARSE_THRESHOLD=${SPARSE_THRESHOLD:-3}
      - FUSEKI_URL=http://fuseki:3030
      - FUSEKI_DATASET=${FUSEKI_DATASET:-smartphone_log}
      - USE_SUPERVISOR_AGENT=${USE_SUPERVISOR_AGENT:-true}
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    command: python backend/main.py
    depends_on:
      fuseki:
        condition: service_healthy
    networks:
      - app-network

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URLS=http://backend:8000/v1
      - OPENAI_API_KEYS=anything
      - WEBUI_AUTH=True
      - ENABLE_OPENAI_API=true
      - DEFAULT_MODELS=rdf-kg-agent
      - ENABLE_SIGNUP=True
      - BYPASS_MODEL_ACCESS_CONTROL=true
      - 'DEFAULT_PROMPT_SUGGESTIONS=[{"title":["일반질문","통화 후 들른 카페는 어디야?"],"content":"2026-04-17에 Jung Su-jin과 통화하고 나서 들른 카페는 어디야?"},{"title":["1hop 질문","Notion으로 준비한 일정은 뭐야?"],"content":"2026-04-23 오전에 Notion으로 준비한 일정은 뭐야?"},{"title":["1hop 질문","photo와 연결된 방문은 뭐야?"],"content":"4월 20일 photo와 연결된 방문은 뭐야?"},{"title":["2hop 질문","사진과 연결된 방문에서 누구를 만났어?"],"content":"4월 17일 사진과 연결된 방문에서 누구를 만났어?"}]'
    volumes:
      - openwebui-data:/app/backend/data
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  openwebui-data:
  fuseki-data:
