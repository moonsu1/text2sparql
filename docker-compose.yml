services:
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: fuseki-server
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=admin123
      - JVM_ARGS=-Xmx2g
      - TDB=2
      - FUSEKI_DATASET_1=smartphone_log
    volumes:
      - fuseki-data:/fuseki
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/$/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      # LLM Provider 선택 (gemini | ollama)
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      # Gemini 설정
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      # Ollama 설정 (Docker container → Windows 호스트 Ollama)
      # host.docker.internal은 Docker container에서 Windows 호스트를 가리킵니다
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5:4b-q8_0}
      - OLLAMA_NUM_PREDICT=${OLLAMA_NUM_PREDICT:-1024}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-8192}
      # 공통
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.3}
      - LLM_REQUEST_DELAY_SEC=${LLM_REQUEST_DELAY_SEC:-0}
      - SPARSE_THRESHOLD=${SPARSE_THRESHOLD:-3}
      - FUSEKI_URL=http://fuseki:3030
      - FUSEKI_DATASET=${FUSEKI_DATASET:-smartphone_log}
      - USE_SUPERVISOR_AGENT=${USE_SUPERVISOR_AGENT:-true}
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    command: python backend/main.py
    depends_on:
      fuseki:
        condition: service_healthy
    networks:
      - app-network

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URLS=http://backend:8000/v1
      - OPENAI_API_KEYS=anything
      - WEBUI_AUTH=True
      - ENABLE_OPENAI_API=true
      - DEFAULT_MODELS=rdf-kg-agent
      - ENABLE_SIGNUP=True
      - BYPASS_MODEL_ACCESS_CONTROL=true
      - DEFAULT_PROMPT_SUGGESTIONS=[{"title":["Jung Su-jin 통화 후","들른 카페는?"],"content":"Jung Su-jin이랑 통화하고 나서 들른 카페 어디였지?"},{"title":["스타벅스 사진","어떤 방문 기록이랑 연결돼?"],"content":"4월 21일 스타벅스에서 찍은 사진은 어떤 방문 기록이랑 연결돼?"},{"title":["스타벅스에서","누구 만났지?"],"content":"스타벅스에서 누구 만났지?"},{"title":["디자인 리뷰 회의 전에","어떤 앱 썼지?"],"content":"디자인 리뷰 회의 전에 어떤 앱 썼지?"}]
    volumes:
      - openwebui-data:/app/backend/data
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  openwebui-data:
  fuseki-data:
