# Property Catalog
# Schema Retrieval에서 사용할 property 메타데이터
# Text2SPARQL 생성 시 관련 property만 선택적으로 제공

# ============================================================================
# CALL EVENT PROPERTIES
# ============================================================================

caller:
  uri: "http://example.org/smartphone-log#caller"
  label:
    en: "caller"
    ko: "발신자"
  description:
    en: "Person who initiated the call"
    ko: "통화를 건 사람"
  domain: "log:CallEvent"
  range: "log:User"
  aliases:
    - "전화 건"
    - "발신"
    - "통화 시작"
  keywords:
    - "call"
    - "전화"
    - "통화"
  example_sparql: "?call log:caller ?user ."

callee:
  uri: "http://example.org/smartphone-log#callee"
  label:
    en: "callee"
    ko: "수신자"
  description:
    en: "Person who received the call"
    ko: "통화를 받은 사람"
  domain: "log:CallEvent"
  range: "log:Person"
  aliases:
    - "전화 받은"
    - "수신"
    - "통화 상대"
  keywords:
    - "call"
    - "전화"
    - "통화"
  example_sparql: "?call log:callee ?person ."

startedAt:
  uri: "http://example.org/smartphone-log#startedAt"
  label:
    en: "started at"
    ko: "시작 시각"
  description:
    en: "Timestamp when the call started"
    ko: "통화가 시작된 시각"
  domain: "log:CallEvent"
  range: "xsd:dateTime"
  aliases:
    - "통화 시작"
    - "시작 시간"
  keywords:
    - "when"
    - "time"
    - "언제"
    - "시각"
  example_sparql: "?call log:startedAt ?time ."

durationSeconds:
  uri: "http://example.org/smartphone-log#durationSeconds"
  label:
    en: "duration (seconds)"
    ko: "통화 시간(초)"
  description:
    en: "Call duration in seconds"
    ko: "통화 지속 시간 (초 단위)"
  domain: "log:CallEvent"
  range: "xsd:integer"
  aliases:
    - "통화 시간"
    - "지속 시간"
    - "몇 분"
  keywords:
    - "duration"
    - "how long"
    - "시간"
    - "길이"
  example_sparql: "?call log:durationSeconds ?duration ."

callType:
  uri: "http://example.org/smartphone-log#callType"
  label:
    en: "call type"
    ko: "통화 유형"
  description:
    en: "Type of call: outgoing, incoming, missed"
    ko: "통화 유형: outgoing, incoming, missed"
  domain: "log:CallEvent"
  range: "xsd:string"
  aliases:
    - "수신/발신"
    - "부재중"
  keywords:
    - "missed"
    - "outgoing"
    - "incoming"
  example_sparql: "?call log:callType ?type ."

