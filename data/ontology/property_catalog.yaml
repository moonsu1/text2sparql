# ============================================================================
# COMMON PROPERTIES (rdfs namespace)
# ============================================================================

rdfs_label:
  uri: "http://www.w3.org/2000/01/rdf-schema#label"
  label:
    en: "rdfs:label"
    ko: "레이블 (rdfs:label)"
  description:
    en: "Human-readable name for any entity (Person, Place, App, etc.) - USE THIS for names!"
    ko: "모든 엔티티(사람, 장소, 앱 등)의 사람이 읽기 쉬운 이름 - 이름 검색 시 필수!"
  domain: "rdfs:Resource"
  range: "xsd:string"
  aliases:
    - "이름"
    - "라벨"
    - "name"
  keywords:
    - "name"
    - "label"
    - "이름"
  example_sparql: "?entity rdfs:label ?name ."
